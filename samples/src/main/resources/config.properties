# SAMCO Stocknote Java Bridge - sample runner config
#
# Fill in the AES-encrypted values produced per:
#   https://docs-tradeapi.samco.in/session/generate-token
#
samco.apiKey=<REPLACE_WITH_YOUR_API_KEY>
samco.apiSecret=<REPLACE_WITH_YOUR_API_SECRET>

# Opt-ins. Streaming samples run for ~30 seconds each and then exit.
# PlaceOrder is destructive (real order on a real exchange) - leave false unless intended.
samco.runPlaceOrder=false
samco.runStreaming=true
